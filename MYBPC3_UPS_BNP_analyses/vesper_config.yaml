# number_obs_experiment: BNP_high, MYBPC3_low, UPS_GFP
protein: "BNP"
control_population: "low"
experiment_population: "high"

### path to file that contains columns: 'Variant', 'bp', 'REF',	'observed_nucleotide', 'cDNA', 'cDNA_name', 'AA_consequence', 'Consequence', 'Pathogenic', 'PLP_BLB_VUS'
